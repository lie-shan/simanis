name: simanis
description: SIMANIS - Sistem Informasi Akademik Nurul Iman

publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  mobile_scanner: ^5.1.0
  audioplayers: ^6.0.0
  google_fonts: ^6.1.0
  url_launcher: ^6.3.0
  youtube_player_flutter: ^9.1.1
  file_picker: ^8.1.2
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.4
  excel: ^4.0.6
  # API & Database
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  # Device Info & Download
  device_info_plus: ^10.1.0
  dio: ^5.4.3+1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/sounds/success.mp3
    - assets/sounds/error.mp3